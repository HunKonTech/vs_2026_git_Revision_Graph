# Builds the interactive browser demo (shared webview bundle + mock data) and
# publishes it to GitHub Pages on every push to main.
#
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions". Then the demo is live at:
#   https://hunkontech.github.io/git_Revision_Graph/
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the demo changes.
    paths:
      - "packages/**"
      - "scripts/build-demo.mjs"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; newer pushes cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build demo
        run: npm run build:demo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
