# Builds the interactive browser demo (shared webview bundle + mock data) and
# publishes it to GitHub Pages on every push to main.
#
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions". Then the demo is live at:
#   https://hunkontech.github.io/git_Revision_Graph/
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the demo changes.
    paths:
      - "packages/**"
      - "scripts/build-demo.mjs"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; newer pushes cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # Pin to the Windows x64 self-hosted runner.
    runs-on: [self-hosted, windows, X64]
    steps:
      - uses: actions/checkout@v4

      # No `cache: npm`: on this memory-constrained self-hosted runner the
      # actions/cache restore fails to allocate its download buffer
      # ("Array buffer allocation failed") and hangs for ~10 min before
      # falling through. Skipping it removes a memory-pressure source.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build demo
        run: npm run build:demo

      # upload-pages-artifact archives with `shell: bash`. On this self-hosted
      # runner `bash` resolves to C:\Windows\System32\bash.exe (the WSL
      # launcher), which has no distro installed and fails with
      # WSL_E_DEFAULT_DISTRO_NOT_FOUND. Prepend Git's bin (real Git Bash + GNU
      # tar) to PATH so the action uses Git Bash instead of WSL.
      - name: Prefer Git Bash over WSL bash
        run: Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\Git\bin"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/demo

  deploy:
    needs: build
    # The deploy step only calls the GitHub Pages REST API (no build, tar, or
    # bash), so it has no reason to run on the self-hosted runner — doing so
    # exposed it to that machine's memory pressure and runner contention with
    # the concurrent release build, which canceled the job mid-poll. This repo
    # is public, so GitHub-hosted runners are free and reliable here.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
