name: Build & Publish Extensions

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write   # GitHub Release létrehozása

jobs:
  release:
    runs-on: [self-hosted, Windows]

    outputs:
      new_version: ${{ steps.ver.outputs.NEW_VERSION }}

    env:
      CURRENT_VERSION: ${{ vars.EXTENSION_VERSION }}

    steps:
      # -----------------------------------------------------------------------
      # 1. Forrás
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Verzió kiszámítása
      # -----------------------------------------------------------------------
      - name: Compute new version
        id: ver
        shell: powershell
        run: |
          $cur = "$env:CURRENT_VERSION"
          if (-not $cur -or $cur -eq '') { $cur = '1.0.0' }

          $parts = $cur -split '\.'
          $major = [int]$parts[0]; $minor = [int]$parts[1]; $patch = [int]$parts[2]

          $bump = if ('${{ inputs.bump }}') { '${{ inputs.bump }}' } else { 'patch' }
          switch ($bump) {
            'major' { $major++; $minor = 0; $patch = 0 }
            'minor' { $minor++;             $patch = 0 }
            'patch' { $patch++ }
          }
          $new = "$major.$minor.$patch"
          $preMinor = $minor + 1
          $preNew = "$major.$preMinor.$patch"
          Write-Host "Version: $cur -> $new (stable)  /  $preNew (pre-release)"
          "NEW_VERSION=$new"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "NEW_VERSION=$new"         | Out-File -FilePath $env:GITHUB_ENV    -Append
          "PRERELEASE_VERSION=$preNew" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "PRERELEASE_VERSION=$preNew" | Out-File -FilePath $env:GITHUB_ENV    -Append

      # -----------------------------------------------------------------------
      # 2b. EXTENSION_VERSION repo változó frissítése AZONNAL.
      #     Így ha bármelyik későbbi (build/publish) lépés elhasal, a következő
      #     futás már az új verziószámmal indul, és nem ragad be ugyanazon a
      #     "v... already exists" hibán.
      # -----------------------------------------------------------------------
      - name: Bump EXTENSION_VERSION repo variable (early)
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $v = $env:NEW_VERSION

          if (-not $env:GH_TOKEN) {
            Write-Warning "GH_PAT secret is empty - cannot persist EXTENSION_VERSION."
            Write-Warning "Create a fine-grained PAT (Variables: Read and write) and save it as the GH_PAT secret."
            Write-Warning "Continuing the build; the version will NOT advance until GH_PAT is set."
            exit 0
          }

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept        = "application/vnd.github.v3+json"
          }
          $body = [ordered]@{
            name  = "EXTENSION_VERSION"
            value = $v
          } | ConvertTo-Json

          # Don't let a token/permission problem kill the whole build — warn and continue.
          try {
            Invoke-RestMethod -Method Patch `
              -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/actions/variables/EXTENSION_VERSION" `
              -Headers $headers `
              -Body $body `
              -ContentType "application/json" | Out-Null
            Write-Host "EXTENSION_VERSION -> $v (bumped before build/publish)"
          } catch {
            Write-Warning "Failed to update EXTENSION_VERSION variable: $($_.Exception.Message)"
            Write-Warning "Check that GH_PAT has 'Variables: Read and write' permission on this repo."
            Write-Warning "Continuing the build; the version will NOT advance this run."
          }

      # -----------------------------------------------------------------------
      # 3. Verzió beírása a forrásba (build előtt)
      # -----------------------------------------------------------------------
      - name: Patch versions in source files
        shell: powershell
        run: |
          $v = $env:NEW_VERSION
          $pattern     = '"version":\s*"[^"]*"'
          $replacement = '"version": "' + $v + '"'

          # root package.json
          $f = 'package.json'
          (Get-Content $f -Raw) -replace $pattern, $replacement | Set-Content $f -NoNewline

          # vscode/package.json
          $f = 'vscode/package.json'
          (Get-Content $f -Raw) -replace $pattern, $replacement | Set-Content $f -NoNewline

          # vs/source.extension.vsixmanifest (XML attribute)
          $manifestPath = (Resolve-Path 'vs/source.extension.vsixmanifest').Path
          $xml = [xml](Get-Content $manifestPath -Raw)
          $xml.PackageManifest.Metadata.Identity.Version = $v
          $xml.Save($manifestPath)

          Write-Host "Patched all version strings to $v"

      # -----------------------------------------------------------------------
      # 4. Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # -----------------------------------------------------------------------
      # 5. Build
      #    A meglévő scripts/build-installers.ps1 elvégzi az npm install-t,
      #    a shared renderer buildet, a VS Code .vsix-eket és a VS VSIX-et.
      # -----------------------------------------------------------------------
      - name: Build all extensions
        shell: powershell
        run: |
          # PS 5.1 reads BOM-less UTF-8 files as Windows-1252.
          # The em dash (U+2014, UTF-8: E2 80 94) has 0x94 as its 3rd byte,
          # which Windows-1252 maps to the right curly quote (U+201D).
          # PowerShell treats U+201D as a string terminator, breaking the parser.
          # Fix: re-write the script with a UTF-8 BOM so PS 5.1 reads it correctly.
          $scriptPath = (Resolve-Path 'scripts\build-installers.ps1').Path
          $content    = [System.IO.File]::ReadAllText($scriptPath, [System.Text.Encoding]::UTF8)
          $utf8bom    = New-Object System.Text.UTF8Encoding $true
          [System.IO.File]::WriteAllText($scriptPath, $content, $utf8bom)
          & $scriptPath

      - name: List artifacts
        shell: powershell
        run: |
          Write-Host "=== dist/installers/ ==="
          Get-ChildItem dist/installers/*.vsix |
            Format-Table Name, @{L='KB'; E={[math]::Round($_.Length/1KB, 1)}}

      # -----------------------------------------------------------------------
      # 6. GitHub Release
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $v   = $env:NEW_VERSION
          $tag = "v$v"

          $pv = $env:PRERELEASE_VERSION
          $notes = @(
            "## Git Revision Graph $v",
            "",
            "### Packages",
            "| File | Description |",
            "|------|-------------|",
            "| rev-graph-vscode-$v.vsix | VS Code stable (engine ^1.85) |",
            "| rev-graph-vscode-vs2026-$pv.vsix | VS Code pre-release - VS 2026 built-in editor (engine ^1.96) |",
            "| RevisionGraph-vs2022.vsix | Visual Studio 2022 extension |",
            "| RevisionGraph-vs2026.vsix | Visual Studio 2026 extension |"
          ) -join "`n"

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept        = "application/vnd.github.v3+json"
          }

          # 1. Get existing release for this tag, or create a new one
          $release = $null
          try {
            $release = Invoke-RestMethod -Method Get `
              -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/tags/$tag" `
              -Headers $headers
            Write-Host "Using existing release: $($release.html_url)"
          } catch {}

          if (-not $release) {
            $releaseJson = [ordered]@{
              tag_name   = $tag
              name       = "v$v"
              body       = $notes
              draft      = $false
              prerelease = $false
            } | ConvertTo-Json

            $release = Invoke-RestMethod -Method Post `
              -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases" `
              -Headers $headers `
              -Body $releaseJson `
              -ContentType "application/json"

            Write-Host "Release created: $($release.html_url)"
          }

          # 2. Upload each VSIX asset (delete existing asset with same name first)
          $uploadBase = $release.upload_url -replace '\{.*\}', ''
          foreach ($assetPath in (Get-ChildItem dist/installers/*.vsix).FullName) {
            $name  = Split-Path $assetPath -Leaf

            $existing = $release.assets | Where-Object { $_.name -eq $name }
            if ($existing) {
              Invoke-RestMethod -Method Delete `
                -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/assets/$($existing.id)" `
                -Headers $headers | Out-Null
              Write-Host "Removed old asset: $name"
            }

            $bytes = [System.IO.File]::ReadAllBytes($assetPath)
            Invoke-RestMethod -Method Post `
              -Uri ($uploadBase + "?name=$name") `
              -Headers $headers `
              -Body $bytes `
              -ContentType "application/octet-stream" | Out-Null
            Write-Host "Uploaded: $name"
          }

      # -----------------------------------------------------------------------
      # 7. VS Code Marketplace — stable
      # -----------------------------------------------------------------------
      - name: Publish VS Code extension (stable)
        shell: powershell
        env:
          VSCE_PAT: ${{ secrets.VS_MARKETPLACE_PAT }}
        run: |
          $vsix = Get-ChildItem dist/installers/rev-graph-vscode-*.vsix |
                  Where-Object { $_.Name -notmatch 'vs2026' } |
                  Select-Object -First 1
          if (-not $vsix) {
            Write-Warning "VS Code stable VSIX not found - skipping."
            exit 0
          }
          Write-Host "Publishing: $($vsix.Name)"
          npx --yes @vscode/vsce publish `
            --pat "$env:VSCE_PAT" `
            --packagePath "$($vsix.FullName)"

      # -----------------------------------------------------------------------
      # 8. VS Code Marketplace — VS 2026 pre-release
      # -----------------------------------------------------------------------
      - name: Publish VS Code extension (VS 2026 pre-release)
        shell: powershell
        env:
          VSCE_PAT: ${{ secrets.VS_MARKETPLACE_PAT }}
        run: |
          $vsix = Get-ChildItem dist/installers/rev-graph-vscode-vs2026-*.vsix |
                  Select-Object -First 1
          if (-not $vsix) {
            Write-Warning "VS Code VS2026 VSIX not found - skipping."
            exit 0
          }
          Write-Host "Publishing (pre-release): $($vsix.Name)"
          npx --yes @vscode/vsce publish `
            --pat "$env:VSCE_PAT" `
            --pre-release `
            --packagePath "$($vsix.FullName)"

      # -----------------------------------------------------------------------
      # 9. Visual Studio Marketplace (VsixPublisher.exe)
      # -----------------------------------------------------------------------
      - name: Publish Visual Studio extension
        shell: powershell
        env:
          VS_PAT: ${{ secrets.VS_MARKETPLACE_PAT }}
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            Write-Warning "vswhere.exe not found - skipping VS Marketplace publish."
            exit 0
          }

          # Find VsixPublisher.exe (prefer VS 2026, fall back to VS 2022)
          $vsixPublisher = $null
          foreach ($spec in @(
              @{ Range = '[18.0,19.0)'; Pre = $true  },
              @{ Range = '[17.0,18.0)'; Pre = $false }
          )) {
            $args = @(
              '-version',  $spec.Range,
              '-latest',
              '-requires', 'Microsoft.VisualStudio.Workload.VisualStudioExtension',
              '-property',  'installationPath'
            )
            if ($spec.Pre) { $args += '-prerelease' }
            $path = & $vswhere @args 2>$null
            if ($path) {
              $candidate = Join-Path $path 'VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe'
              if (Test-Path $candidate) { $vsixPublisher = $candidate; break }
            }
          }

          if (-not $vsixPublisher) {
            Write-Warning "VsixPublisher.exe not found - skipping VS Marketplace publish."
            Write-Warning "Ensure the VS Extension Development workload is installed on this runner."
            exit 0
          }
          Write-Host "VsixPublisher: $vsixPublisher"

          # VSIX to publish (prefer vs2026, fall back to vs2022)
          $vsix = Get-ChildItem `
              dist/installers/RevisionGraph-vs2026.vsix,
              dist/installers/RevisionGraph-vs2022.vsix `
              -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $vsix) {
            Write-Warning "Visual Studio VSIX not found - skipping."
            exit 0
          }
          Write-Host "Publishing VS extension: $($vsix.Name)"

          & $vsixPublisher publish `
            -payload       "$($vsix.FullName)" `
            -publishManifest 'vs/publishManifest.json' `
            -personalAccessToken "$env:VS_PAT"

          if ($LASTEXITCODE -ne 0) {
            Write-Error "VsixPublisher.exe exited with code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "Successfully published to Visual Studio Marketplace."

  # -------------------------------------------------------------------------
  # Second job: build VS 2022 VSIX on the self-hosted Windows runner.
  # Runs after the release job so the GitHub Release already exists.
  # Uses Microsoft.VSSDK.BuildTools (NuGet) — no workload install needed.
  # -------------------------------------------------------------------------
  build-vs-vsix:
    needs: release
    runs-on: [self-hosted, Windows]
    if: success() || needs.release.result == 'success'

    env:
      NEW_VERSION: ${{ needs.release.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Verzio beírása a VS manifestbe
      # -----------------------------------------------------------------------
      - name: Patch version in VS manifest
        shell: powershell
        run: |
          $v = $env:NEW_VERSION
          $pattern     = '"version":\s*"[^"]*"'
          $replacement = '"version": "' + $v + '"'
          $f = 'package.json'
          (Get-Content $f -Raw) -replace $pattern, $replacement | Set-Content $f -NoNewline
          $manifestPath = (Resolve-Path 'vs/source.extension.vsixmanifest').Path
          $xml = [xml](Get-Content $manifestPath -Raw)
          $xml.PackageManifest.Metadata.Identity.Version = $v
          $xml.Save($manifestPath)
          Write-Host "Patched VS manifest to $v"

      # -----------------------------------------------------------------------
      # 2. Node + web asset build (szükséges a VS extension webview-hoz)
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web assets for VS
        shell: powershell
        run: |
          npm install
          # A copy-vs-assets a graph-webview/dist-ből másol, ezért előbb fel kell
          # építeni a shared renderert (core + webview), különben ENOENT.
          npm run build:core
          npm run build:webview
          npm run build:vs-assets

      # -----------------------------------------------------------------------
      # 3. VS 2022 VSIX build MSBuild-del
      #    Microsoft.VSSDK.BuildTools NuGet-csomagot a /t:Restore visszallitja,
      #    igy nem kell az Extension development workload.
      # -----------------------------------------------------------------------
      - name: Build VS 2022 VSIX
        shell: powershell
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            Write-Warning "vswhere.exe not found - skipping."
            exit 0
          }
          # A VSIX-et a Microsoft.VSSDK.BuildTools NuGet buildeli, ezért bármelyik
          # MSBuild jó (a manifest install-target [17.0,19.0) VS 2022 + VS 2026).
          # A runner image VS 2022-t VAGY VS 2026-ot tartalmazhat, ezért tág a
          # tartomány és a -prerelease is kell (a VS 2026 prerelease-ként jelölt).
          $path = & $vswhere -version "[17.0,19.0)" -latest -prerelease `
            -requires Microsoft.Component.MSBuild `
            -property installationPath
          if (-not $path) {
            Write-Warning "No Visual Studio with MSBuild found - skipping."
            exit 0
          }
          $msbuild = Join-Path $path "MSBuild\Current\Bin\MSBuild.exe"
          if (-not (Test-Path $msbuild)) {
            Write-Warning "MSBuild.exe not found at $msbuild - skipping."
            exit 0
          }
          Write-Host "MSBuild: $msbuild"
          # Two-pass build: Restore must complete in its own invocation so that the
          # NuGet-generated obj\*.nuget.g.targets (which contains the VSSDK
          # CreateVsixContainer target) is written to disk before the project is
          # re-evaluated for the actual Rebuild.  A single /t:Restore,Rebuild call
          # evaluates the project before restore runs, so the VSIX target is never
          # imported and the .vsix file is never produced.
          & $msbuild vs\RevisionGraph.csproj /t:Restore /v:minimal
          if ($LASTEXITCODE -ne 0) { throw "MSBuild Restore failed ($LASTEXITCODE)" }
          & $msbuild vs\RevisionGraph.csproj `
            /t:Rebuild `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:DeployExtension=false `
            /v:minimal
          if ($LASTEXITCODE -ne 0) { throw "MSBuild Rebuild failed ($LASTEXITCODE)" }
          $built = "vs\bin\Release\RevisionGraph.vsix"
          if (-not (Test-Path $built)) {
            Write-Warning "VSIX not found at $built after build."
            exit 0
          }
          New-Item -ItemType Directory -Force "dist\installers" | Out-Null
          Copy-Item $built "dist\installers\RevisionGraph-vs2022.vsix" -Force
          Write-Host "VS 2022 VSIX ready."

      # -----------------------------------------------------------------------
      # 4. Feltoltes a mar meglevo GitHub Release-be
      # -----------------------------------------------------------------------
      - name: Upload VS 2022 VSIX to GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          $vsixPath = "dist\installers\RevisionGraph-vs2022.vsix"
          if (-not (Test-Path $vsixPath)) {
            Write-Warning "RevisionGraph-vs2022.vsix not found - skipping upload."
            exit 0
          }
          $v   = $env:NEW_VERSION
          $tag = "v$v"
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept        = "application/vnd.github.v3+json"
          }
          $release = Invoke-RestMethod -Method Get `
            -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/tags/$tag" `
            -Headers $headers
          $uploadBase = $release.upload_url -replace '\{.*\}', ''
          $name = "RevisionGraph-vs2022.vsix"
          $existing = $release.assets | Where-Object { $_.name -eq $name }
          if ($existing) {
            Invoke-RestMethod -Method Delete `
              -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/assets/$($existing.id)" `
              -Headers $headers | Out-Null
            Write-Host "Removed old asset: $name"
          }
          $bytes = [System.IO.File]::ReadAllBytes((Resolve-Path $vsixPath).Path)
          Invoke-RestMethod -Method Post `
            -Uri ($uploadBase + "?name=$name") `
            -Headers $headers `
            -Body $bytes `
            -ContentType "application/octet-stream" | Out-Null
          Write-Host "Uploaded: $name"

      # -----------------------------------------------------------------------
      # 5. Visual Studio Marketplace publish
      #    VsixPublisher.exe is part of the VS Extension Development workload.
      #    The windows-2025-vs2026 runner ships VS 2026 Enterprise which
      #    includes it; search without a workload constraint so the path check
      #    is the real gate.
      # -----------------------------------------------------------------------
      - name: Publish Visual Studio extension to Marketplace
        shell: powershell
        env:
          VS_PAT: ${{ secrets.VS_MARKETPLACE_PAT }}
        run: |
          if (-not $env:VS_PAT) {
            Write-Warning "VS_MARKETPLACE_PAT secret is empty - skipping publish."
            exit 0
          }
          $vsixPath = "dist\installers\RevisionGraph-vs2022.vsix"
          if (-not (Test-Path $vsixPath)) {
            Write-Warning "VSIX not found - skipping publish."
            exit 0
          }
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            Write-Warning "vswhere.exe not found - skipping publish."
            exit 0
          }
          # Search any VS 17-18 installation; VsixPublisher lives under VSSDK\
          # regardless of the exact workload set.
          $vsixPublisher = $null
          foreach ($spec in @(
            @{ Range = '[18.0,19.0)'; Pre = $true  },
            @{ Range = '[17.0,18.0)'; Pre = $false }
          )) {
            $vsArgs = @('-version', $spec.Range, '-latest', '-requires', 'Microsoft.Component.MSBuild', '-property', 'installationPath')
            if ($spec.Pre) { $vsArgs += '-prerelease' }
            $installPath = & $vswhere @vsArgs 2>$null
            if ($installPath) {
              $candidate = Join-Path $installPath 'VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe'
              if (Test-Path $candidate) { $vsixPublisher = $candidate; break }
            }
          }
          if (-not $vsixPublisher) {
            Write-Warning "VsixPublisher.exe not found - skipping VS Marketplace publish."
            Write-Warning "Install the 'Visual Studio extension development' workload on this runner."
            exit 0
          }
          Write-Host "VsixPublisher: $vsixPublisher"
          & $vsixPublisher publish `
            -payload       (Resolve-Path $vsixPath).Path `
            -publishManifest (Resolve-Path 'vs\publishManifest.json').Path `
            -personalAccessToken "$env:VS_PAT"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "VsixPublisher.exe exited with code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "Successfully published to Visual Studio Marketplace."

  # -------------------------------------------------------------------------
  # X (Twitter) release announcement
  # -------------------------------------------------------------------------
  post-to-x:
    if: ${{ needs.release.result == 'success' && github.event_name == 'push' }}
    needs:
      - release
      - build-vs-vsix
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Post release announcement to X
        continue-on-error: true
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          NEW_VERSION: ${{ needs.release.outputs.new_version }}
          X_POST_TEMPLATE: |
            Git Revision Graph {tag} megjelent!

            Lathatova teszi az osszes agat es commitot VS Code-ban es Visual Studio-ban egyarant.

            {release_url}
            #git #vscode #VisualStudio #DevTools #GitHistory
        run: |
          python3 scripts/post_x_release.py \
            --app-name "Git Revision Graph" \
            --tag "v${NEW_VERSION}" \
            --release-url "https://github.com/HunKonTech/git_Revision_Graph/releases/tag/v${NEW_VERSION}"
