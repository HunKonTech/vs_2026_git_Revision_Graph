<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#50a0ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#21262d" stroke-width="1" opacity="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
  </g>

  <!-- ===== LEFT SIDE: GRAPH VISUALIZATION ===== -->
  <rect x="60" y="60" width="580" height="520" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Panel header -->
  <rect x="60" y="60" width="580" height="42" rx="12" fill="#21262d"/>
  <rect x="60" y="90" width="580" height="12" fill="#21262d"/>
  <circle cx="84" cy="81" r="6" fill="#ff5f56"/>
  <circle cx="104" cy="81" r="6" fill="#ffbd2e"/>
  <circle cx="124" cy="81" r="6" fill="#27c93f"/>
  <text x="640" y="87" text-anchor="middle" fill="#8b949e" font-size="13">Revision Graph — my-project</text>

  <!-- GRAPH EDGES -->
  <line x1="130" y1="165" x2="130" y2="305" stroke="#0078d4" stroke-width="2.5" opacity="0.8"/>
  <line x1="130" y1="345" x2="130" y2="425" stroke="#0078d4" stroke-width="2.5" opacity="0.8"/>
  <line x1="130" y1="465" x2="130" y2="505" stroke="#0078d4" stroke-width="2.5" opacity="0.8"/>
  <path d="M130,285 Q130,325 195,325" fill="none" stroke="#3fb950" stroke-width="2.5" opacity="0.8"/>
  <line x1="195" y1="345" x2="195" y2="405" stroke="#3fb950" stroke-width="2.5" opacity="0.8"/>
  <path d="M195,425 Q195,465 130,465" fill="none" stroke="#3fb950" stroke-width="2.5" opacity="0.8"/>
  <path d="M130,405 Q130,445 260,445" fill="none" stroke="#d29922" stroke-width="2.5" opacity="0.8"/>
  <line x1="325" y1="165" x2="325" y2="265" stroke="#8957e5" stroke-width="2.5" opacity="0.8"/>
  <line x1="325" y1="305" x2="325" y2="365" stroke="#8957e5" stroke-width="2.5" opacity="0.8"/>

  <!-- COMMIT NODES -->
  <!-- HEAD -->
  <rect x="100" y="125" width="60" height="40" rx="6" fill="#0078d4" stroke="#50a0ff" stroke-width="2" filter="url(#glow)"/>
  <text x="130" y="140" text-anchor="middle" fill="white" font-size="9" font-weight="600">HEAD</text>
  <text x="130" y="156" text-anchor="middle" fill="#cce4ff" font-size="9" font-family="monospace">a1b2c3d</text>
  <rect x="170" y="130" width="56" height="18" rx="4" fill="#0078d4" opacity="0.25" stroke="#0078d4" stroke-width="1"/>
  <text x="198" y="143" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="600">main</text>

  <rect x="100" y="185" width="60" height="40" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="130" y="200" text-anchor="middle" fill="#8b949e" font-size="9">merge</text>
  <text x="130" y="216" text-anchor="middle" fill="#6e7681" font-size="9" font-family="monospace">f4e3d2c</text>

  <rect x="100" y="245" width="60" height="40" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="130" y="260" text-anchor="middle" fill="#c9d1d9" font-size="9">fix: auth</text>
  <text x="130" y="276" text-anchor="middle" fill="#6e7681" font-size="9" font-family="monospace">b5c6d7e</text>

  <rect x="100" y="305" width="60" height="40" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="130" y="320" text-anchor="middle" fill="#c9d1d9" font-size="9">refactor</text>
  <text x="130" y="336" text-anchor="middle" fill="#6e7681" font-size="9" font-family="monospace">c8d9e0f</text>

  <rect x="100" y="385" width="60" height="40" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="130" y="400" text-anchor="middle" fill="#c9d1d9" font-size="9">feat: API</text>
  <text x="130" y="416" text-anchor="middle" fill="#6e7681" font-size="9" font-family="monospace">d1e2f3a</text>
  <rect x="168" y="391" width="46" height="18" rx="4" fill="#d29922" opacity="0.2" stroke="#d29922" stroke-width="1"/>
  <text x="191" y="404" text-anchor="middle" fill="#d29922" font-size="10" font-weight="600">v1.0.0</text>

  <rect x="100" y="445" width="60" height="40" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="130" y="460" text-anchor="middle" fill="#c9d1d9" font-size="9">init</text>
  <text x="130" y="476" text-anchor="middle" fill="#6e7681" font-size="9" font-family="monospace">e4f5a6b</text>

  <!-- Feature branch -->
  <rect x="165" y="305" width="60" height="40" rx="6" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="195" y="320" text-anchor="middle" fill="#c9d1d9" font-size="9">feature</text>
  <text x="195" y="336" text-anchor="middle" fill="#6e7681" font-size="9" font-family="monospace">7a8b9c0</text>
  <rect x="222" y="308" width="72" height="18" rx="4" fill="#3fb950" opacity="0.15" stroke="#3fb950" stroke-width="1"/>
  <text x="258" y="321" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600">feat/ui-rework</text>

  <rect x="165" y="365" width="60" height="40" rx="6" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="195" y="380" text-anchor="middle" fill="#c9d1d9" font-size="9">wip: ui</text>
  <text x="195" y="396" text-anchor="middle" fill="#6e7681" font-size="9" font-family="monospace">8b9c0d1</text>

  <!-- Hotfix -->
  <rect x="230" y="425" width="60" height="40" rx="6" fill="#21262d" stroke="#d29922" stroke-width="1.5"/>
  <text x="260" y="440" text-anchor="middle" fill="#c9d1d9" font-size="9">hotfix</text>
  <text x="260" y="456" text-anchor="middle" fill="#6e7681" font-size="9" font-family="monospace">9c0d1e2</text>
  <rect x="298" y="428" width="68" height="18" rx="4" fill="#d29922" opacity="0.15" stroke="#d29922" stroke-width="1"/>
  <text x="332" y="441" text-anchor="middle" fill="#d29922" font-size="10" font-weight="600">hotfix/crash</text>

  <!-- Remote -->
  <rect x="295" y="125" width="65" height="40" rx="6" fill="#21262d" stroke="#8957e5" stroke-width="1.5"/>
  <text x="327" y="140" text-anchor="middle" fill="#c9d1d9" font-size="9">origin</text>
  <text x="327" y="156" text-anchor="middle" fill="#6e7681" font-size="9" font-family="monospace">a1b2c3d</text>
  <rect x="366" y="130" width="82" height="18" rx="4" fill="#8957e5" opacity="0.15" stroke="#8957e5" stroke-width="1"/>
  <text x="407" y="143" text-anchor="middle" fill="#8957e5" font-size="10" font-weight="600">origin/main</text>

  <rect x="295" y="185" width="65" height="40" rx="6" fill="#21262d" stroke="#8957e5" stroke-width="1.5"/>
  <text x="327" y="200" text-anchor="middle" fill="#c9d1d9" font-size="9">remote</text>
  <text x="327" y="216" text-anchor="middle" fill="#6e7681" font-size="9" font-family="monospace">f4e3d2c</text>

  <rect x="295" y="245" width="65" height="40" rx="6" fill="#21262d" stroke="#8957e5" stroke-width="1.5"/>
  <text x="327" y="260" text-anchor="middle" fill="#c9d1d9" font-size="9">behind</text>
  <text x="327" y="276" text-anchor="middle" fill="#6e7681" font-size="9" font-family="monospace">b5c6d7e</text>

  <!-- ===== RIGHT SIDE: TITLE ===== -->
  <!-- VS logo -->
  <rect x="720" y="85" width="44" height="44" rx="8" fill="#68217a"/>
  <text x="742" y="116" text-anchor="middle" fill="white" font-size="22" font-weight="700">VS</text>
  <text x="772" y="115" fill="#8b949e" font-size="11">Visual Studio</text>

  <!-- VS Code logo -->
  <rect x="880" y="85" width="44" height="44" rx="8" fill="#007acc"/>
  <path d="M888,107 L902,95 L916,107 L902,119 Z" fill="none" stroke="white" stroke-width="3"/>
  <path d="M888,107 L902,99 L916,107" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  <text x="932" y="115" fill="#8b949e" font-size="11">VS Code</text>

  <line x1="700" y1="148" x2="1220" y2="148" stroke="#21262d" stroke-width="1.5"/>

  <!-- Title -->
  <text x="960" y="220" text-anchor="middle" fill="#f0f6fc" font-size="52" font-weight="700" letter-spacing="-1">Git Revision Graph</text>
  <text x="960" y="262" text-anchor="middle" fill="#8b949e" font-size="20">TortoiseSVN-style for Visual Studio &amp; VS Code</text>
  <rect x="820" y="278" width="280" height="3" rx="2" fill="url(#blueGrad)"/>

  <!-- Feature pills -->
  <rect x="718" y="312" width="136" height="32" rx="16" fill="#0078d4" opacity="0.15" stroke="#0078d4" stroke-width="1"/>
  <text x="786" y="333" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="500">DAG visualization</text>
  <rect x="868" y="312" width="126" height="32" rx="16" fill="#3fb950" opacity="0.12" stroke="#3fb950" stroke-width="1"/>
  <text x="931" y="333" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="500">Branch &amp; tags</text>
  <rect x="1008" y="312" width="132" height="32" rx="16" fill="#8957e5" opacity="0.12" stroke="#8957e5" stroke-width="1"/>
  <text x="1074" y="333" text-anchor="middle" fill="#a371f7" font-size="13" font-weight="500">Right-click menu</text>

  <!-- Feature list -->
  <circle cx="730" cy="387" r="4" fill="#0078d4"/>
  <text x="744" y="392" fill="#c9d1d9" font-size="15">Commit graph with column-per-branch layout</text>
  <circle cx="730" cy="425" r="4" fill="#3fb950"/>
  <text x="744" y="430" fill="#c9d1d9" font-size="15">Local &amp; remote branches, tags visualized</text>
  <circle cx="730" cy="463" r="4" fill="#d29922"/>
  <text x="744" y="468" fill="#c9d1d9" font-size="15">Create branch from any commit — natively</text>
  <circle cx="730" cy="501" r="4" fill="#8957e5"/>
  <text x="744" y="506" fill="#c9d1d9" font-size="15">Checkout, copy SHA, zoom &amp; pan</text>

  <!-- Footer -->
  <line x1="700" y1="528" x2="1220" y2="528" stroke="#21262d" stroke-width="1.5"/>
  <text x="718" y="553" fill="#6e7681" font-size="12">github.com/BenKoncsik</text>
  <text x="960" y="553" text-anchor="middle" fill="#6e7681" font-size="12">Open Source · MIT License</text>
  <text x="1220" y="553" text-anchor="end" fill="#6e7681" font-size="12">Visual Studio · VS Code</text>

  <!-- Corner accent -->
  <rect x="1180" y="60" width="60" height="4" rx="2" fill="url(#blueGrad)" opacity="0.6"/>
  <rect x="1236" y="60" width="4" height="60" rx="2" fill="url(#blueGrad)" opacity="0.6"/>
</svg>
